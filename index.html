<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpineo · Gestion Événements</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1D9E75;--green-dark:#0F6E56;--green-light:#E1F5EE;--green-mid:#5DCAA5;
  --bg:#F5F4F1;--card:#FFFFFF;--border:#E2E0DA;--border2:#CECCC4;
  --text:#1A1916;--text2:#6B6860;--text3:#A8A69E;
  --red:#C94B3A;--red-bg:#FCECEA;--amber:#B86B0A;--amber-bg:#FEF3E2;
  --blue:#2B62B8;--blue-bg:#EBF0FB;--purple:#5C4FCC;--purple-bg:#EEECFC;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
  --radius:10px;--radius-sm:6px;--radius-lg:14px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}

/* LAYOUT */
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}

/* SIDEBAR */
.logo{padding:20px 18px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.logo-mark{width:32px;height:32px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-text{font-weight:600;font-size:15px;letter-spacing:-.3px}
.logo-sub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
nav{padding:12px 10px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--green-light);color:var(--green-dark)}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.nav-section{font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--text3);text-transform:uppercase;padding:12px 10px 4px}
.sidebar-footer{padding:14px;border-top:1px solid var(--border)}
.sidebar-footer-text{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}

/* TOPBAR */
.topbar{padding:18px 28px;border-bottom:1px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.page-title{font-size:18px;font-weight:600;letter-spacing:-.3px}
.page-sub{font-size:12px;color:var(--text3);margin-top:1px}
.topbar-actions{display:flex;gap:8px}

/* CONTENT */
.content{padding:24px 28px;flex:1}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--bg);border-color:var(--border2)}
.btn-primary{background:var(--green);color:#fff;border-color:var(--green-dark)}
.btn-primary:hover{background:var(--green-dark)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{width:30px;height:30px;padding:0;justify-content:center}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
.stat-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.stat-value{font-size:28px;font-weight:600;letter-spacing:-.5px;line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.stat.green .stat-value{color:var(--green-dark)}
.stat.amber .stat-value{color:var(--amber)}
.stat.red .stat-value{color:var(--red)}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap input{width:100%;padding:7px 10px 7px 32px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none}
.search-wrap input:focus{border-color:var(--green)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px}
select{padding:7px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;cursor:pointer}
select:focus{border-color:var(--green)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
.badge-green{background:var(--green-light);color:var(--green-dark)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-purple{background:var(--purple-bg);color:var(--purple)}
.badge-gray{background:var(--bg);color:var(--text2);border:1px solid var(--border)}

/* EVENT CARDS */
.event-list{display:flex;flex-direction:column;gap:10px}
.event-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;display:flex;align-items:flex-start;gap:14px;box-shadow:var(--shadow);transition:border-color .15s}
.event-card:hover{border-color:var(--border2)}
.event-color{width:4px;border-radius:4px;align-self:stretch;flex-shrink:0}
.event-body{flex:1;min-width:0}
.event-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.event-name{font-weight:600;font-size:14px;letter-spacing:-.2px}
.event-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap;color:var(--text2);font-size:12px}
.event-meta span{display:flex;align-items:center;gap:4px}
.event-progress{margin-top:8px;display:flex;align-items:center;gap:8px}
.progress-track{flex:1;height:3px;background:var(--bg);border-radius:3px;overflow:hidden;max-width:120px}
.progress-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s}
.progress-label{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.event-note{font-size:12px;color:var(--text3);margin-top:5px}
.event-actions{display:flex;gap:4px;flex-shrink:0}
.countdown{font-family:'DM Mono',monospace;font-size:11px;background:var(--green-light);color:var(--green-dark);padding:2px 7px;border-radius:20px;font-weight:500}
.countdown.past{background:var(--bg);color:var(--text3)}

/* GANTT */
.gantt-wrap{overflow-x:auto;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.gantt-inner{min-width:700px}
.gantt-head{display:flex;border-bottom:1px solid var(--border);background:var(--bg)}
.gantt-head-label{width:220px;flex-shrink:0;padding:10px 14px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;border-right:1px solid var(--border)}
.gantt-head-weeks{flex:1;display:flex}
.gantt-week-cell{flex:1;padding:8px 4px;font-size:10px;color:var(--text3);text-align:center;font-family:'DM Mono',monospace;border-right:1px solid var(--border);min-width:52px}
.gantt-week-cell:last-child{border-right:none}
.gantt-row{display:flex;border-bottom:1px solid var(--border);align-items:center}
.gantt-row:last-child{border-bottom:none}
.gantt-row-label{width:220px;flex-shrink:0;padding:10px 14px;border-right:1px solid var(--border)}
.gantt-row-label .task-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-row-label .task-detail{font-size:11px;color:var(--text3);margin-top:2px}
.gantt-timeline{flex:1;display:flex;position:relative;height:44px;align-items:center}
.gantt-col{flex:1;height:100%;border-right:1px solid var(--border);min-width:52px}
.gantt-col:last-child{border-right:none}
.gantt-bar{position:absolute;height:22px;border-radius:5px;display:flex;align-items:center;padding:0 8px;font-size:11px;color:#fff;font-weight:600;white-space:nowrap;overflow:hidden;cursor:pointer;transition:opacity .15s;top:50%;transform:translateY(-50%)}
.gantt-bar:hover{opacity:.85}
.gantt-milestone{position:absolute;width:16px;height:16px;border-radius:3px;transform:translateY(-50%) rotate(45deg);cursor:pointer;top:50%}
.gantt-milestone:hover{opacity:.8}
.today-marker{position:absolute;top:0;bottom:0;width:1.5px;background:var(--red);opacity:.5;pointer-events:none;z-index:2}
.event-row{background:var(--green-light)}
.gantt-row.event-row .gantt-row-label .task-name{color:var(--green-dark);font-weight:700}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-title{font-size:16px;font-weight:600;letter-spacing:-.3px}
.cal-grid-head{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-day-name{text-align:center;font-size:11px;font-weight:600;color:var(--text3);padding:4px 0;letter-spacing:.05em;text-transform:uppercase}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-cell{min-height:72px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px;cursor:pointer;transition:border-color .12s}
.cal-cell:hover{border-color:var(--border2)}
.cal-cell.today{border-color:var(--green);border-width:2px}
.cal-cell.other .day-num{color:var(--text3)}
.day-num{font-size:12px;font-weight:600;margin-bottom:3px;font-family:'DM Mono',monospace}
.cal-event{font-size:10px;font-weight:600;padding:2px 5px;border-radius:3px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#fff}

/* TASKS */
.task-list{display:flex;flex-direction:column;gap:8px}
.task-item{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:13px 16px;display:flex;align-items:flex-start;gap:12px;box-shadow:var(--shadow);transition:border-color .15s}
.task-item:hover{border-color:var(--border2)}
.task-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;background:var(--card);font-size:11px;color:transparent;transition:all .15s}
.task-check.done{background:var(--green);border-color:var(--green-dark);color:#fff}
.task-content{flex:1}
.task-title{font-size:13px;font-weight:500}
.task-title.done{text-decoration:line-through;color:var(--text3)}
.task-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:4px}
.task-late{color:var(--red);font-size:11px;font-weight:600}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(20,18,14,.4);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-bg.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;width:min(500px,94vw);max-height:88vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.modal h3{font-size:17px;font-weight:600;letter-spacing:-.3px;margin-bottom:18px}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;letter-spacing:.03em}
.form-row input,.form-row select,.form-row textarea{width:100%;font-size:13px;padding:8px 11px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .12s}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--green);background:var(--card)}
.form-row textarea{resize:vertical;min-height:64px}
.form-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

.empty{text-align:center;padding:48px 24px;color:var(--text3)}
.empty-icon{font-size:32px;display:block;margin-bottom:10px}
.section-title{font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);margin-bottom:12px}

/* VIEWS */
.view{display:none}.view.active{display:block}
</style>
</head>
<body>
<div class="shell">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark">🏔</div>
      <div>
        <div class="logo-text">Alpineo</div>
        <div class="logo-sub">Events Manager</div>
      </div>
    </div>
    <nav>
      <div class="nav-section">Navigation</div>
      <button class="nav-item active" onclick="switchView('dashboard')"><span class="icon">📊</span> Dashboard</button>
      <button class="nav-item" onclick="switchView('events')"><span class="icon">📅</span> Événements</button>
      <button class="nav-item" onclick="switchView('gantt')"><span class="icon">📐</span> Rétro-planning</button>
      <button class="nav-item" onclick="switchView('calendar')"><span class="icon">🗓</span> Calendrier</button>
      <button class="nav-item" onclick="switchView('tasks')"><span class="icon">✅</span> Tâches</button>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-footer-text">Alpineo © 2026</div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- TOPBAR -->
    <div class="topbar">
      <div>
        <div class="page-title" id="page-title">Dashboard</div>
        <div class="page-sub" id="page-sub">Vue d'ensemble des événements 2026</div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="openEventModal()">＋ Nouvel événement</button>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content">

      <!-- DASHBOARD -->
      <div id="view-dashboard" class="view active">
        <div class="stats" id="stats"></div>
        <div class="section-title">Prochains événements</div>
        <div class="event-list" id="dash-events"></div>
      </div>

      <!-- EVENTS -->
      <div id="view-events" class="view">
        <div class="toolbar">
          <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-events" placeholder="Rechercher…" oninput="renderEvents()">
          </div>
          <select id="filter-type" onchange="renderEvents()">
            <option value="">Tous types</option>
            <option>Lancement</option><option>Séminaire</option><option>Team building</option>
            <option>Conférence</option><option>Soirée</option><option>Salon</option><option>Autre</option>
          </select>
          <select id="filter-status" onchange="renderEvents()">
            <option value="">Tous statuts</option>
            <option>En préparation</option><option>Confirmé</option><option>Terminé</option><option>Annulé</option>
          </select>
        </div>
        <div class="event-list" id="event-list"></div>
      </div>

      <!-- GANTT -->
      <div id="view-gantt" class="view">
        <div class="toolbar">
          <select id="gantt-select" onchange="renderGantt()" style="flex:1;max-width:360px"></select>
          <button class="btn btn-primary" onclick="openTaskModal()">＋ Ajouter étape</button>
        </div>
        <div id="gantt-container"></div>
      </div>

      <!-- CALENDAR -->
      <div id="view-calendar" class="view">
        <div class="cal-nav">
          <button class="btn" onclick="calPrev()">← Préc.</button>
          <span class="cal-title" id="cal-title"></span>
          <button class="btn" onclick="calNext()">Suiv. →</button>
        </div>
        <div class="cal-grid-head">
          <div class="cal-day-name">Lun</div><div class="cal-day-name">Mar</div>
          <div class="cal-day-name">Mer</div><div class="cal-day-name">Jeu</div>
          <div class="cal-day-name">Ven</div><div class="cal-day-name">Sam</div>
          <div class="cal-day-name">Dim</div>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>

      <!-- TASKS -->
      <div id="view-tasks" class="view">
        <div class="toolbar">
          <select id="task-filter" onchange="renderTasks()" style="flex:1;max-width:360px"></select>
          <select id="task-priority-filter" onchange="renderTasks()">
            <option value="">Toutes priorités</option>
            <option>Haute</option><option>Normale</option><option>Basse</option>
          </select>
          <button class="btn btn-primary" onclick="openTaskModal()">＋ Nouvelle étape</button>
        </div>
        <div class="task-list" id="task-list"></div>
      </div>

    </div><!-- /content -->
  </main>
</div>

<!-- EVENT MODAL -->
<div class="modal-bg" id="event-modal">
  <div class="modal">
    <h3 id="event-modal-title">Nouvel événement</h3>
    <div class="form-row"><label>Nom de l'événement</label><input id="f-name" type="text" placeholder="Ex : Séminaire d'hiver 2026"></div>
    <div class="form-2">
      <div class="form-row"><label>Date début</label><input id="f-start" type="date"></div>
      <div class="form-row"><label>Date fin</label><input id="f-end" type="date"></div>
    </div>
    <div class="form-2">
      <div class="form-row"><label>Type</label>
        <select id="f-type"><option>Lancement</option><option>Séminaire</option><option>Team building</option><option>Conférence</option><option>Soirée</option><option>Salon</option><option>Autre</option></select>
      </div>
      <div class="form-row"><label>Statut</label>
        <select id="f-status"><option>En préparation</option><option>Confirmé</option><option>Terminé</option><option>Annulé</option></select>
      </div>
    </div>
    <div class="form-2">
      <div class="form-row"><label>Lieu</label><input id="f-lieu" type="text" placeholder="Ville, adresse…"></div>
      <div class="form-row"><label>Participants</label><input id="f-pax" type="number" min="0" placeholder="0"></div>
    </div>
    <div class="form-row"><label>Notes</label><textarea id="f-notes" placeholder="Objectifs, intervenants, remarques…"></textarea></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeEventModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveEvent()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- TASK MODAL -->
<div class="modal-bg" id="task-modal">
  <div class="modal">
    <h3>Nouvelle étape</h3>
    <div class="form-row"><label>Événement</label><select id="tf-event"></select></div>
    <div class="form-row"><label>Titre de l'étape</label><input id="tf-title" type="text" placeholder="Ex : Réservation du lieu"></div>
    <div class="form-2">
      <div class="form-row"><label>Échéance</label><input id="tf-due" type="date"></div>
      <div class="form-row"><label>Responsable</label><input id="tf-owner" type="text" placeholder="Nom ou équipe"></div>
    </div>
    <div class="form-row"><label>Priorité</label>
      <select id="tf-priority"><option>Haute</option><option>Normale</option><option>Basse</option></select>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeTaskModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveTask()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
const COLORS = {Lancement:"#2B62B8",Séminaire:"#1D9E75","Team building":"#B86B0A",Conférence:"#5C4FCC",Soirée:"#C94B8A",Salon:"#C94B3A",Autre:"#6B6860"};
const fmtD = d => new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});
const fmtDY = d => new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});

const DEFAULT_EVENTS = [
  {id:1,name:"Lancement gamme été 2026",start:"2026-06-15",end:"2026-06-15",type:"Lancement",status:"Confirmé",lieu:"Paris – Hôtel Pullman",pax:120,notes:"Présentation nouvelles collections"},
  {id:2,name:"Séminaire managérial",start:"2026-07-03",end:"2026-07-05",type:"Séminaire",status:"En préparation",lieu:"Chamonix – Club Alpin",pax:40,notes:"Ateliers cohésion et stratégie"},
  {id:3,name:"Team building montagne",start:"2026-08-22",end:"2026-08-23",type:"Team building",status:"En préparation",lieu:"Annecy",pax:80,notes:"Via ferrata + soirée raclette"},
  {id:4,name:"Salon outdoor Lyon",start:"2026-09-10",end:"2026-09-12",type:"Salon",status:"Confirmé",lieu:"Eurexpo Lyon",pax:500,notes:"Stand 48m² — démo produit"},
  {id:5,name:"Conférence partenaires",start:"2026-10-08",end:"2026-10-08",type:"Conférence",status:"En préparation",lieu:"Grenoble",pax:200,notes:"Keynotes + networking"},
  {id:6,name:"Soirée fin d'année",start:"2026-12-18",end:"2026-12-18",type:"Soirée",status:"En préparation",lieu:"Lyon",pax:150,notes:"Dîner de gala équipe Alpineo"},
];
const DEFAULT_TASKS = [
  {id:1,eventId:1,title:"Réservation du lieu",due:"2026-04-01",owner:"Marie L.",priority:"Haute",done:true},
  {id:2,eventId:1,title:"Invitations presse",due:"2026-05-01",owner:"Com' team",priority:"Haute",done:true},

  {id:11,eventId:4,title:"Conception stand",due:"2026-07-01",owner:"Design",priority:"Haute",done:false},
  {id:12,eventId:4,title:"Matériel & PLV",due:"2026-08-15",owner:"Ops",priority:"Normale",done:false},
  {id:13,eventId:5,title:"Invitation conférenciers",due:"2026-07-01",owner:"Com'",priority:"Haute",done:false},

  {id:15,eventId:6,title:"Choix traiteur",due:"2026-09-01",owner:"Direction",priority:"Normale",done:false},
];

function save(){
  localStorage.setItem('alpineo_events',JSON.stringify(events));
  localStorage.setItem('alpineo_tasks',JSON.stringify(tasks));
  localStorage.setItem('alpineo_nev',nEv);
  localStorage.setItem('alpineo_ntk',nTk);
}
function load(){
  try{
    const e=localStorage.getItem('alpineo_events');
    const t=localStorage.getItem('alpineo_tasks');
    if(e) events=JSON.parse(e); else events=[...DEFAULT_EVENTS];
    if(t) tasks=JSON.parse(t); else tasks=[...DEFAULT_TASKS];
    nEv=parseInt(localStorage.getItem('alpineo_nev'))||events.length+1;
    nTk=parseInt(localStorage.getItem('alpineo_ntk'))||tasks.length+1;
  }catch(err){events=[...DEFAULT_EVENTS];tasks=[...DEFAULT_TASKS];}
}

let events=[], tasks=[], editEventId=null, calY=2026, calM=5, nEv=1, nTk=1;
load();

const VIEWS = {
  dashboard:{title:"Dashboard",sub:"Vue d'ensemble des événements 2026"},
  events:{title:"Événements",sub:"Gérez et suivez tous vos événements"},
  gantt:{title:"Rétro-planning",sub:"Visualisez les étapes de préparation"},
  calendar:{title:"Calendrier",sub:"Vue mensuelle de tous les événements"},
  tasks:{title:"Tâches & étapes",sub:"Suivi des actions par événement"},
};

function switchView(v){
  document.querySelectorAll('.nav-item').forEach((el,i)=>{
    el.classList.toggle('active',['dashboard','events','gantt','calendar','tasks'][i]===v);
  });
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.getElementById('page-title').textContent=VIEWS[v].title;
  document.getElementById('page-sub').textContent=VIEWS[v].sub;
  if(v==='dashboard')renderDashboard();
  if(v==='events')renderEvents();
  if(v==='gantt'){populateGanttSelect();renderGantt();}
  if(v==='calendar')renderCalendar();
  if(v==='tasks'){populateTaskFilter();renderTasks();}
}

function statusBadge(s){return({
  "En préparation":"badge-amber","Confirmé":"badge-green","Terminé":"badge-gray","Annulé":"badge-red"
}[s]||"badge-gray");}
function prioBadge(p){return({"Haute":"badge-red","Normale":"badge-blue","Basse":"badge-gray"}[p]||"badge-gray");}

function eventCard(e,showAll=true){
  const ts=tasks.filter(t=>t.eventId===e.id), done=ts.filter(t=>t.done).length;
  const pct=ts.length?Math.round(done/ts.length*100):0;
  const daysLeft=Math.ceil((new Date(e.start)-TODAY)/86400000);
  const isPast=daysLeft<0, isFuture=daysLeft>0;
  const cdText=isPast?'Passé':(daysLeft===0?'Aujourd\'hui':`J−${daysLeft}`);
  return `<div class="event-card">
    <div class="event-color" style="background:${COLORS[e.type]||'#888'}"></div>
    <div class="event-body">
      <div class="event-top">
        <span class="event-name">${e.name}</span>
        <span class="badge ${statusBadge(e.status)}">${e.status}</span>
        <span class="badge badge-gray">${e.type}</span>
        <span class="countdown ${isPast?'past':''}">${cdText}</span>
      </div>
      <div class="event-meta">
        <span>📅 ${fmtD(e.start)}${e.end!==e.start?' → '+fmtD(e.end):''}</span>
        ${e.lieu?`<span>📍 ${e.lieu}</span>`:''}
        ${e.pax?`<span>👥 ${e.pax} pers.</span>`:''}
      </div>
      ${ts.length?`<div class="event-progress"><div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div><span class="progress-label">${done}/${ts.length} étapes</span></div>`:''}
      ${e.notes?`<div class="event-note">${e.notes}</div>`:''}
    </div>
    <div class="event-actions">
      <button class="btn btn-sm btn-icon" onclick="editEvent(${e.id})" title="Modifier">✏️</button>
      <button class="btn btn-sm btn-icon" onclick="deleteEvent(${e.id})" title="Supprimer">🗑</button>
    </div>
  </div>`;
}

function renderDashboard(){
  const total=events.length,confirmed=events.filter(e=>e.status==="Confirmé").length;
  const prep=events.filter(e=>e.status==="En préparation").length;
  const late=tasks.filter(t=>!t.done&&new Date(t.due)<TODAY).length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">Total</div><div class="stat-value">${total}</div><div class="stat-sub">événements 2026</div></div>
    <div class="stat green"><div class="stat-label">Confirmés</div><div class="stat-value">${confirmed}</div></div>
    <div class="stat amber"><div class="stat-label">En préparation</div><div class="stat-value">${prep}</div></div>
    <div class="stat red"><div class="stat-label">Tâches en retard</div><div class="stat-value">${late}</div></div>
  `;
  const upcoming=events.filter(e=>new Date(e.start)>=TODAY).sort((a,b)=>a.start.localeCompare(b.start)).slice(0,4);
  document.getElementById('dash-events').innerHTML=upcoming.length?upcoming.map(e=>eventCard(e)).join(''):`<div class="empty"><span class="empty-icon">🎉</span>Aucun événement à venir</div>`;
}

function renderEvents(){
  const q=(document.getElementById('search-events').value||'').toLowerCase();
  const ft=document.getElementById('filter-type').value;
  const fs=document.getElementById('filter-status').value;
  let evs=events.filter(e=>{
    return (!q||e.name.toLowerCase().includes(q)||(e.lieu||'').toLowerCase().includes(q))&&(!ft||e.type===ft)&&(!fs||e.status===fs);
  }).sort((a,b)=>a.start.localeCompare(b.start));
  const el=document.getElementById('event-list');
  el.innerHTML=evs.length?evs.map(e=>eventCard(e)).join(''):`<div class="empty"><span class="empty-icon">🔍</span>Aucun événement trouvé</div>`;
}

function populateGanttSelect(){
  document.getElementById('gantt-select').innerHTML=events.sort((a,b)=>a.start.localeCompare(b.start)).map(e=>`<option value="${e.id}">${e.name}</option>`).join('');
}

function renderGantt(){
  const evId=parseInt(document.getElementById('gantt-select').value);
  const ev=events.find(e=>e.id===evId);
  if(!ev){document.getElementById('gantt-container').innerHTML='<div class="empty"><span class="empty-icon">📐</span>Sélectionnez un événement</div>';return;}
  const evTasks=tasks.filter(t=>t.eventId===evId).sort((a,b)=>a.due.localeCompare(b.due));
  const evEnd=new Date(ev.end);
  const allDates=[new Date(ev.start),...evTasks.map(t=>new Date(t.due))];
  const minD=new Date(Math.min(...allDates.map(d=>d.getTime()),TODAY.getTime()));
  minD.setDate(minD.getDate()-14);
  const startMon=new Date(minD);startMon.setDate(startMon.getDate()-(startMon.getDay()+6)%7);
  const maxD=new Date(evEnd.getTime()+14*86400000);
  const totalDays=Math.ceil((maxD-startMon)/86400000);
  const weeks=Math.ceil(totalDays/7);
  const weekLabels=[];
  for(let i=0;i<weeks;i++){
    const d=new Date(startMon.getTime()+i*7*86400000);
    weekLabels.push(d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}));
  }
  const totalW=weeks;
  const pct=d=>{const days=Math.ceil((new Date(d)-startMon)/86400000);return Math.max(0,Math.min(100,days/totalDays*100));};
  const todayPct=pct(TODAY);

  function makeRow(label,sub,barStart,barEnd,color,milestone=false,done=false,taskId=null){
    const left=pct(barStart), right=pct(barEnd||barStart);
    const w=milestone?0:Math.max(0.5,right-left);
    const barHtml=milestone
      ?`<div class="gantt-milestone" style="left:calc(${left}% - 8px);background:${done?'#1D9E75':color}" ${taskId?`onclick="toggleTask(${taskId})" title="Cliquer pour marquer fait"`:''}></div>`
      :`<div class="gantt-bar" style="left:${left}%;width:${w}%;background:${color}">${fmtD(barStart)}</div>`;
    return `<div class="gantt-row ${label===ev.name?'event-row':''}">
      <div class="gantt-row-label">
        <div class="task-name" style="${done?'text-decoration:line-through;color:var(--text3)':''}">${label}</div>
        ${sub?`<div class="task-detail">${sub}</div>`:''}
      </div>
      <div class="gantt-timeline" style="position:relative">
        ${weekLabels.map((_,i)=>`<div class="gantt-col"></div>`).join('')}
        <div class="today-marker" style="left:${todayPct}%"></div>
        ${barHtml}
      </div>
    </div>`;
  }

  let html=`<div class="gantt-wrap"><div class="gantt-inner">
    <div class="gantt-head">
      <div class="gantt-head-label">Étape / Événement</div>
      <div class="gantt-head-weeks">${weekLabels.map(w=>`<div class="gantt-week-cell">${w}</div>`).join('')}</div>
    </div>
    ${makeRow(ev.name,ev.lieu,ev.start,ev.end,COLORS[ev.type]||'#888')}
    ${evTasks.map(t=>makeRow(t.title,`${t.owner} · ${t.priority}`,t.due,null,t.done?'#1D9E75':COLORS[ev.type]||'#888',true,t.done,t.id)).join('')}
    ${!evTasks.length?`<div style="padding:16px 14px;color:var(--text3);font-size:13px">Aucune étape — ajoutez-en une ↗</div>`:''}
  </div></div>`;
  document.getElementById('gantt-container').innerHTML=html;
}

function renderCalendar(){
  const MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  document.getElementById('cal-title').textContent=`${MONTHS[calM]} ${calY}`;
  const first=new Date(calY,calM,1);
  const startDow=(first.getDay()+6)%7;
  const daysInMonth=new Date(calY,calM+1,0).getDate();
  const prevDays=new Date(calY,calM,0).getDate();
  const cells=[];
  for(let i=startDow-1;i>=0;i--)cells.push({d:prevDays-i,cur:false});
  for(let i=1;i<=daysInMonth;i++)cells.push({d:i,cur:true});
  while(cells.length%7!==0)cells.push({d:cells.length-startDow-daysInMonth+1,cur:false});
  document.getElementById('cal-grid').innerHTML=cells.map(c=>{
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(c.d).padStart(2,'0')}`;
    const isToday=c.cur&&new Date(ds).getTime()===TODAY.getTime();
    const dayEvs=c.cur?events.filter(e=>{const s=new Date(e.start),en=new Date(e.end),d=new Date(ds);return d>=s&&d<=en;}):[];
    return `<div class="cal-cell ${!c.cur?'other':''} ${isToday?'today':''}">
      <div class="day-num">${c.d}</div>
      ${dayEvs.map(e=>`<div class="cal-event" style="background:${COLORS[e.type]||'#888'}">${e.name}</div>`).join('')}
    </div>`;
  }).join('');
}
function calPrev(){if(calM===0){calM=11;calY--;}else calM--;renderCalendar();}
function calNext(){if(calM===11){calM=0;calY++;}else calM++;renderCalendar();}

function populateTaskFilter(){
  document.getElementById('task-filter').innerHTML=`<option value="">Tous les événements</option>`+events.sort((a,b)=>a.start.localeCompare(b.start)).map(e=>`<option value="${e.id}">${e.name}</option>`).join('');
}

function renderTasks(){
  const evId=parseInt(document.getElementById('task-filter').value)||0;
  const prio=document.getElementById('task-priority-filter').value;
  let ts=tasks.filter(t=>(!evId||t.eventId===evId)&&(!prio||t.priority===prio)).sort((a,b)=>a.due.localeCompare(b.due));
  const el=document.getElementById('task-list');
  if(!ts.length){el.innerHTML='<div class="empty"><span class="empty-icon">✅</span>Aucune étape</div>';return;}
  el.innerHTML=ts.map(t=>{
    const ev=events.find(e=>e.id===t.eventId);
    const isLate=!t.done&&new Date(t.due)<TODAY;
    return `<div class="task-item">
      <div class="task-check ${t.done?'done':''}" onclick="toggleTask(${t.id})">✓</div>
      <div class="task-content">
        <div class="task-title ${t.done?'done':''}">${t.title}</div>
        <div class="task-meta">
          ${ev?`<span class="badge badge-gray">${ev.name}</span>`:''}
          <span class="badge ${prioBadge(t.priority)}">${t.priority}</span>
          <span class="badge ${isLate?'badge-red':'badge-gray'}">📅 ${fmtDY(t.due)}</span>
          ${t.owner?`<span style="font-size:12px;color:var(--text2)">👤 ${t.owner}</span>`:''}
          ${isLate?`<span class="task-late">⚠ En retard</span>`:''}
        </div>
      </div>
      <button class="btn btn-sm btn-icon" onclick="deleteTask(${t.id})" title="Supprimer">🗑</button>
    </div>`;
  }).join('');
}

function toggleTask(id){
  const t=tasks.find(t=>t.id===id);if(t)t.done=!t.done;
  save();
  const active=document.querySelector('.view.active').id.replace('view-','');
  if(active==='tasks')renderTasks();
  if(active==='gantt')renderGantt();
  if(active==='dashboard')renderDashboard();
  if(active==='events')renderEvents();
}

function openEventModal(id=null){
  editEventId=id;
  const e=id?events.find(ev=>ev.id===id):null;
  document.getElementById('event-modal-title').textContent=id?'Modifier l\'événement':'Nouvel événement';
  document.getElementById('f-name').value=e?e.name:'';
  document.getElementById('f-start').value=e?e.start:'';
  document.getElementById('f-end').value=e?e.end:'';
  document.getElementById('f-type').value=e?e.type:'Lancement';
  document.getElementById('f-status').value=e?e.status:'En préparation';
  document.getElementById('f-lieu').value=e?(e.lieu||''):'';
  document.getElementById('f-pax').value=e?(e.pax||''):'';
  document.getElementById('f-notes').value=e?(e.notes||''):'';
  document.getElementById('event-modal').classList.add('open');
}
function closeEventModal(){document.getElementById('event-modal').classList.remove('open');}
function saveEvent(){
  const name=document.getElementById('f-name').value.trim();if(!name)return;
  const d={name,start:document.getElementById('f-start').value,end:document.getElementById('f-end').value||document.getElementById('f-start').value,type:document.getElementById('f-type').value,status:document.getElementById('f-status').value,lieu:document.getElementById('f-lieu').value,pax:parseInt(document.getElementById('f-pax').value)||0,notes:document.getElementById('f-notes').value};
  if(editEventId)Object.assign(events.find(e=>e.id===editEventId),d);
  else events.push({id:nEv++,...d});
  save(); closeEventModal();
  const active=document.querySelector('.view.active').id.replace('view-','');
  if(active==='dashboard')renderDashboard();
  if(active==='events')renderEvents();
}
function editEvent(id){openEventModal(id);}
function deleteEvent(id){if(confirm('Supprimer cet événement ?')){events=events.filter(e=>e.id!==id);tasks=tasks.filter(t=>t.eventId!==id);save();const active=document.querySelector('.view.active').id.replace('view-','');if(active==='dashboard')renderDashboard();if(active==='events')renderEvents();}}

function openTaskModal(){
  document.getElementById('tf-event').innerHTML=events.sort((a,b)=>a.start.localeCompare(b.start)).map(e=>`<option value="${e.id}">${e.name}</option>`).join('');
  const curEvId=parseInt(document.getElementById('gantt-select')?.value||0);
  if(curEvId)document.getElementById('tf-event').value=curEvId;
  document.getElementById('tf-title').value='';
  document.getElementById('tf-due').value='';
  document.getElementById('tf-owner').value='';
  document.getElementById('tf-priority').value='Normale';
  document.getElementById('task-modal').classList.add('open');
}
function closeTaskModal(){document.getElementById('task-modal').classList.remove('open');}
function saveTask(){
  const title=document.getElementById('tf-title').value.trim();if(!title)return;
  tasks.push({id:nTk++,eventId:parseInt(document.getElementById('tf-event').value),title,due:document.getElementById('tf-due').value,owner:document.getElementById('tf-owner').value,priority:document.getElementById('tf-priority').value,done:false});
  save(); closeTaskModal();
  const active=document.querySelector('.view.active').id.replace('view-','');
  if(active==='gantt'){populateGanttSelect();renderGantt();}
  if(active==='tasks')renderTasks();
  if(active==='dashboard')renderDashboard();
  if(active==='events')renderEvents();
}
function deleteTask(id){tasks=tasks.filter(t=>t.id!==id);save();renderTasks();}

// Close modals on bg click
document.querySelectorAll('.modal-bg').forEach(bg=>bg.addEventListener('click',e=>{if(e.target===bg){bg.classList.remove('open');}}));

// Init
renderDashboard();
</script>
